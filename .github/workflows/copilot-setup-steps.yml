# ~~ Generated by projen. To modify, edit .projenrc.ts and run "pnpm exec projen".

name: copilot-setup-steps
on:
  workflow_dispatch: {}
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
jobs:
  copilot-setup-steps:
    name: Copilot Setup Steps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - name: Install project dependencies
        run: pnpm install --frozen-lockfile
      - name: Install uv (provides uvx for running AWS MCP servers)
        uses: astral-sh/setup-uv@v6
      - name: Pre-cache AWS CDK MCP server
        run: uvx awslabs.cdk-mcp-server@latest --help
